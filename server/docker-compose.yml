services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: keeper
      POSTGRES_PASSWORD: keeper
      POSTGRES_DB: keeper
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - keeper-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keeper -d keeper"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:6379:6379"

  api:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      DATABASE_URL: postgres://keeper:keeper@postgres:5432/keeper
      REDIS_URL: redis://redis:6379
      PORT: 8787
      SERVER_GIT_REPO_DIR: /data/keeper-notes
      SERVER_GIT_BRANCH: main
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./api:/app
      - keeper-notes:/data/keeper-notes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    environment:
      KEEPER_API_DOMAIN: ${KEEPER_API_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - keeper-caddy-data:/data
      - keeper-caddy-config:/config
    depends_on:
      api:
        condition: service_started

volumes:
  keeper-postgres:
  keeper-notes:
  keeper-caddy-data:
  keeper-caddy-config:
