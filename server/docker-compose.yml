services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: keeper
      POSTGRES_PASSWORD: keeper
      POSTGRES_DB: keeper
    ports:
      - "5432:5432"
    volumes:
      - keeper-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keeper -d keeper"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run db:migrate && npm run dev"
    environment:
      DATABASE_URL: postgres://keeper:keeper@postgres:5432/keeper
      PORT: 8787
    ports:
      - "8787:8787"
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  keeper-postgres:
